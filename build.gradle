plugins {
    id 'fabric-loom' version '1.10-SNAPSHOT'
    id 'maven-publish'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

version = project.mod_version
group = project.maven_group

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

configurations {
    shadow
    implementation.extendsFrom shadow
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    
    // For injection
    shadow 'com.sun:tools:1.8'
    shadow 'org.ow2.asm:asm:9.6'
    shadow 'org.ow2.asm:asm-commons:9.6'
}

shadowJar {
    configurations = [project.configurations.shadow]
    archiveClassifier.set('full')
    
    manifest {
        attributes(
            'Premain-Class': 'com.uranium.inject.Agent',
            'Agent-Class': 'com.uranium.inject.Agent',
            'Can-Retransform-Classes': 'true',
            'Can-Redefine-Classes': 'true'
        )
    }
    
    relocate 'org.objectweb.asm', 'com.uranium.libs.asm'
}

build.dependsOn shadowJar
